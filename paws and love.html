<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Love</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tagesschrift&display=swap" rel="stylesheet">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Tagesschrift&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="paws and love.css">
</head>
<body>
    <div class="navigation">
        <div class="logo">🐾 Paws & Love</div>
        <div class="nav-links">
            <a href="#" class="home">Home</a>
            <a href="#" class="adopt">Adopt</a>
            <a href="#" class="about">About Us</a>
            <a href="#" class="working">How it Works</a>
            <a href="#" class="contact">Contact</a>
        </div>
        <div class="right">
            <button class="favourites">Favourites</button>
            <button class="login">Login</button>
        </div>
    </div>  
    <div class="main">
        <div class="text">
            <p class="quote">A little love changes everything</p>
            <p class="subquote">Give a stray a home and get a friend for life. Adopt, don't shop.</p>
            <button class="now">Adopt Now</button>
            <button class="more">Learn More</button>
        </div>
        <div class="mainpic">
            <img src="puppy1.webp" class="first">
        </div>
    </div>

    <div class="mini_nav">
        <p class="meet">Meet our adorable friends</p>
        <img src="" alt="" class="icon">
        <button class="view">View All Pets > </button>
    </div>
    <div class="animals">
        <div class="card1">
            <img src="puppy2.jpg" class="pic1">
            <p class="name">Milo</p>
            <p class="desc">Playful • Vaccinated</p>
            <div class="finalise">
                <button class="adopt_me">Adopt Me</button>
                <button class="like">❤</button>
            </div>
        </div>
        <div class="card2">
            <img src="kitten1.webp" class="pic2">
            <p class="name">Bruno</p>
            <p class="desc">Friendly • Dewormed</p>
            <div class="finalise">
                <button class="adopt_me">Adopt Me</button>
                <button class="like">❤</button>
            </div>
        </div>
        <div class="card3">
            <img src="puppy3.jpg" class="pic3">
            <p class="name">Luna</p>
            <p class="desc">Sweet • Litter Trained</p>
            <div class="finalise">
                <button class="adopt_me">Adopt Me</button>
                <button class="like">❤</button>
            </div>
        </div>
        <div class="card4">
            <img src="kitten2.webp" class="pic4">
            <p class="name">Rocky</p>
            <p class="desc">Energetic • Vaccinated</p>
            <div class="finalise">
                <button class="adopt_me">Adopt Me</button>
                <button class="like">❤</button>
            </div>
        </div>
    </div>
</body>
</html>
